  - "Antigravity Assistant"

ai_usage_summary: |
  Used Gemini for system design, mathematical formulas for scoring, and temporal logic rules. 
  Used Antigravity coding assistant to orchestrate files, manage background processes, and run tests.

methodology_summary: |
  Hybrid RAG candidate ranking pipeline. We pre-compute candidate resume embeddings using the offline-capable 
  all-MiniLM-L6-v2 model and store similarity scores. The ranking script rank.py runs completely offline in 
  under 3 seconds on CPU. It applies a temporal audit filter (Honeypot Shield) to instantly remove fraudulent 
  profiles, filters unrelated titles, scores skills by duration/endorsements, and applies a platform activity 
  multiplier to prioritize active, hirable talent. We also built an interactive Streamlit recruiting portal 
  featuring file uploads, Plotly telemetry charts, a profile safety inspector, and instant CSV shortlist exports.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
